name: "⑥ グッズ終了前リマインド通知"

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  remind-goods-end:
    name: "グッズ終了前リマインド通知"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4

      - name: "🐍 Python 3.12 セットアップ"
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: "📦 依存パッケージインストール"
        run: pip install -r requirements.txt

      - name: "▶️ remind_goods_end.py 実行"
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          DISCORD_GOODS_WEBHOOK: ${{ secrets.DISCORD_GOODS_WEBHOOK }}
          DISCORD_NIJISANJI_GOODS_NOTIFY_ROLE_ID: ${{ secrets.DISCORD_NIJISANJI_GOODS_NOTIFY_ROLE_ID }}
        run: python scripts/remind_goods_end.py
