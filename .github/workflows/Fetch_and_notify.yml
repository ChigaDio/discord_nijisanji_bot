name: "① YouTube 新着取得 & Discord 通知 (15分ごと)"

on:
  # 手動実行も可能
  workflow_dispatch:
    inputs:
      channel_id:
        description: "YouTube チャンネル ID（省略時は Secrets の値を使用）"
        required: false
        type: string
        default: "UCbc8fwhdUNlqi-J99ISYu4A"
      max_results:
        description: "取得する最大動画数"
        required: false
        type: string
        default: "5"
      role_id:
        description: "メンションID"
        required: false
        type: string
        default: "1506186376599834634"

jobs:
  fetch-and-notify:
    name: "新着動画を取得して Discord 通知"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # ── 1. リポジトリをチェックアウト ──────────────────────
      - name: "📥 Checkout"
        uses: actions/checkout@v4

      # ── 2. Python セットアップ ─────────────────────────────
      - name: "🐍 Python 3.12 セットアップ"
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      # ── 3. 依存パッケージインストール ──────────────────────
      - name: "📦 依存パッケージインストール"
        run: pip install -r requirements.txt

      # ── 4. スクリプト実行 ──────────────────────────────────
      - name: "▶️ fetch_and_notify.py 実行"
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          CHANNEL_ID:      ${{ inputs.channel_id || secrets.CHANNEL_ID }}
          MONGODB_URI:     ${{ secrets.MONGODB_URI }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_NOTICE }}
          ROLE_ID:         ${{ inputs.role_id || secrets.ROLE_ID }}
        run: |
          python scripts/fetch_and_notify.py \
            --max-results ${{ inputs.max_results || '10' }}
